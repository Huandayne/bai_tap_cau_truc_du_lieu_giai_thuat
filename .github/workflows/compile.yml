name: Compile All C Files and Push to Repo

on: [push, workflow_dispatch]

# Cấp quyền cho máy ảo được phép ghi/đẩy file vào repo của bạn
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile all C files
        shell: powershell
        run: |
          Get-ChildItem -Filter *.c -Recurse | ForEach-Object {
              $name = $_.BaseName
              gcc $_.FullName -o "$name.exe"
          }

      # Bước mới: Tự động gom các file .exe vừa tạo và commit thẳng vào repo
      - name: Commit and Push EXE files
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Thêm tất cả file .exe vào hàng đợi commit
          git add *.exe
          
          # Kiểm tra xem có file .exe nào mới hoặc có thay đổi không, nếu có thì mới commit
          if git diff-index --quiet HEAD; then
            echo "No changes to commit"
          else
            git commit -m "Automated compile: Updated EXE files"
            git push
          fi
